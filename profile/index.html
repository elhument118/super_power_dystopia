<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTCG Dystopia - Profile System</title>
    <link rel="stylesheet" href="src/css/main.css">
</head>
<body>
    <header>
        <h1 class="title">PTCG Dystopia: 캐릭터 도감</h1>
    </header>

    <section class="filter-container">
        <button class="filter-btn active" data-type="ALL">All</button>
        <button class="filter-btn" data-type="Grass">Grass</button>
        <button class="filter-btn" data-type="Fire">Fire</button>
        <button class="filter-btn" data-type="Water">Water</button>
        <button class="filter-btn" data-type="Lightning">Lightning</button>
        <button class="filter-btn" data-type="Psychic">Psychic</button>
        <button class="filter-btn" data-type="Earth">Earth</button>
        <button class="filter-btn" data-type="Dark">Dark</button>
        <button class="filter-btn" data-type="Metal">Metal</button>
        <button class="filter-btn" data-type="Dragon">Dragon</button>
        <button class="filter-btn" data-type="Wind">Wind</button>
    </section>

    <main id="app">
        <div id="character-container" class="container"></div>
    </main>

    <script type="module" src="src/js/interaction.js"></script>
</body>
</html>
